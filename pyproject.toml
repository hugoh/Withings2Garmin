[project]
name = "withings2garmin"
version = "1.0.0"
description = "Simplified Withings to Garmin sync tool"
authors = [
    { name = "Albert Sodel", email = "sodelalbert@gmail.com" }
]
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"

dependencies = [
    "requests>=2.31.0",
    "garminconnect>=0.2.7",
]

[project.scripts]
withings2garmin = "withings2garmin.sync:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/withings2garmin"]

[dependency-groups]
dev = [
    "black>=25.1.0",
    "mypy>=1.17.0",
    "flake8-pyproject>=1.2.3",
    "flake8-isort>=6.1.2",
    "isort>=6.0.1",
    "pytest>=8.4.1",
    "types-requests>=2.32.4.20250611",
]

[tool.pylint]
ignore = [".venv"]

[tool.flake8]
exclude = [".venv"]
max-line-length = 88

[tool.black]
line-length = 88

[tool.isort]
profile = "black"
line_length = 88

[[tool.mypy.overrides]]
module = "garminconnect.*"
ignore_missing_imports = true
