[project]
name = "withings2garmin"
version = "1.0.0"
description = "Simplified Withings to Garmin sync tool"
authors = [
    { name = "Albert Sodel", email = "sodelalbert@gmail.com" }
]
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"

dependencies = [
    "requests>=2.34.2",
    "garminconnect>=0.3.6",
]

[project.scripts]
withings2garmin = "withings2garmin.sync:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/withings2garmin"]

[dependency-groups]
dev = [
    "black>=26.5.1",
    "mypy>=2.2.0",
    "flake8-pyproject>=1.2.4",
    "flake8-isort>=7.0.0",
    "isort>=8.0.1",
    "pytest>=9.1.1",
    "types-requests>=2.33.0.20260518",
]

[tool.pylint]
ignore = [".venv"]

[tool.flake8]
exclude = [".venv"]
max-line-length = 88

[tool.black]
line-length = 88

[tool.isort]
profile = "black"
line_length = 88

[[tool.mypy.overrides]]
module = "garminconnect.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
