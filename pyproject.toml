[project]
name = "withings2garmin"
version = "1.0.0"
description = "Simplified Withings to Garmin sync tool"
authors = [
    { name = "Albert Sodel", email = "sodelalbert@gmail.com" }
]
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"

dependencies = [
    "requests>=2.34.2",
    "garminconnect>=0.3.6",
    "platformdirs>=4.0",
]

[project.scripts]
withings2garmin = "withings2garmin.sync:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "mypy>=2.2.0",
    "ruff>=0.15.20",
    "pytest>=9.1.1",
    "types-requests>=2.33.0.20260518",
]

[tool.hatch.build.targets.wheel]
packages = ["src/withings2garmin"]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]

[[tool.mypy.overrides]]
module = "garminconnect.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
